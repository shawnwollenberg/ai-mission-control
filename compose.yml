services:
  postgres:
    image: postgres:16.4-bookworm
    environment:
      POSTGRES_DB: mission_control
      POSTGRES_USER: mission_control
      POSTGRES_PASSWORD: mission_control_local
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mission_control -d mission_control"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - mission-control-postgres:/var/lib/postgresql/data

volumes:
  mission-control-postgres:
